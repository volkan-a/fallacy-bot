<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallacy Tarot - Mystical Logic Analysis</title>
    <meta name="description" content="Discover logical fallacies in popular Reddit posts, presented as beautiful tarot cards.">
    <link rel="stylesheet" href="style.css">
    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 Fallacy Tarot 🔮</h1>
            <p class="subtitle">Discover logical fallacies hidden in everyday discourse</p>
            <div class="last-updated" id="last-updated">Last updated: Loading...</div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" data-filter="newest" aria-label="Sort by Newest">Newest</button>
            <button class="tab-btn" data-filter="hot" aria-label="Sort by Hot">Hot</button>
            <button class="tab-btn" data-filter="best" aria-label="Sort by Best">Best</button>
        </nav>

        <main id="content" class="slider-container" aria-live="polite">
            <div class="loading">
                <div class="spinner"></div>
                <p>Consulting the cards...</p>
            </div>
        </main>

        <nav class="nav-arrows" aria-label="Card navigation">
            <button class="arrow-btn prev-btn" id="prev-btn" aria-label="Previous card" disabled>❮</button>
            <div class="card-counter" id="card-counter">0 / 0</div>
            <button class="arrow-btn next-btn" id="next-btn" aria-label="Next card" disabled>❯</button>
        </nav>
        
        <footer>
            <p>Automatically generated every 6 hours from Reddit data.</p>
            <p>Images generated by Stable Diffusion XL. Analysis by Hugging Face.</p>
            <p><small>For educational purposes only.</small></p>
        </footer>
    </div>

    <!-- Template for a card (used by JS) -->
    <template id="card-template">
        <div class="card fade-in">
            <div class="tarot-display">
                <div class="tarot-image-container">
                    <img class="tarot-image" src="" alt="Tarot Card" loading="lazy">
                    <div class="confidence-badge"></div>
                </div>
                
                <div class="fallacy-info">
                    <div class="card-header">
                        <span class="card-number">X</span>
                        <h2 class="fallacy-title">Title</h2>
                    </div>
                    
                    <div class="explanation">
                        <h3>The Reading</h3>
                        <p class="explanation-text">Explanation here</p>
                        <blockquote class="fallacy-quote">"Quote here"</blockquote>
                    </div>
                    
                    <div class="original-post">
                        <h3>The Source</h3>
                        <div class="post-meta">
                            <span class="subreddit">r/subreddit</span>
                            <span class="author">u/author</span>
                            <span class="reddit-score">⭐ 0</span>
                        </div>
                        <h4 class="post-title">Post Title</h4>
                        <div class="post-text">Post content</div>
                                <a href="#" class="source-link" target="_blank" rel="noopener noreferrer">View Original on Hacker News</a>
                    </div>

                    <div class="vote-section">
                        <button class="vote-btn upvote" aria-label="Upvote">
                            <span class="icon">⬆️</span> <span class="count">0</span>
                        </button>
                        <span class="vote-score">0</span>
                        <button class="vote-btn downvote" aria-label="Downvote">
                            <span class="icon">⬇️</span> <span class="count">0</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
