name: Fallacy Tarot Automation

on:
  schedule:
    - cron: '0 */6 * * *'  # Her 6 saatte bir çalışır
  workflow_dispatch:      # Manuel olarak da tetiklenebilir

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pillow huggingface_hub python-dotenv

      - name: Fetch Reddit Data (wget only)
        run: |
          mkdir -p data
          USER_AGENT="FallacyTarotBot/1.0 (by /u/fallacy_tarot)"
          SUBREDDITS=("worldnews" "fallacy" "philosophy" "funny" "science" "todayilearned" "changemyview")
          
          echo "Fetching Reddit data via wget..."
          > data/raw_reddit.jsonl
          
          for sub in "${SUBREDDITS[@]}"; do
            echo "Trying r/${sub}..."
            URL="https://www.reddit.com/r/${sub}/top.json?t=week&limit=15"
            
            if wget --timeout=10 --tries=2 -U "$USER_AGENT" -O "data/reddit_${sub}.json" "$URL" 2>/dev/null; then
              echo "Success fetching r/${sub}"
              sleep 2
            else
              echo "Failed to fetch r/${sub}, will rely on fallback in Python"
            fi
          done
          
          echo "Raw JSON files saved in data/ directory."

      - name: Run Fallacy Analysis & Generation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python .github/workflows/run_fallacy_analysis.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ generated_cards/ || true
          git diff --staged --quiet || git commit -m "Auto-update: New fallacy cards generated [skip ci]"
          git push
