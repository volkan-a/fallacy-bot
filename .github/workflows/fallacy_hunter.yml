name: Fallacy Hunter Automation

on:
  schedule:
    # Günde 4 kez çalıştır (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  analyze-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests praw huggingface_hub pillow

      - name: Run Analysis Script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: 'FallacyHunterBot/1.0'
        run: python scripts/analyze.py

      - name: Commit and Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/archive.json docs/assets/*
          git commit -m "Update: New Fallacy Found [Auto]" || echo "No changes to commit"
          git push
